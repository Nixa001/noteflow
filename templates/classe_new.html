
<!-- templates/classe_new.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle Classe - Bulletins Scolaires</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1>📚 Bulletins Scolaires</h1>
            <a href="/dashboard" class="btn-secondary">← Retour</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2>Nouvelle Classe</h2>
            <form method="POST" action="/classes/create">
                <div class="form-group">
                    <label>Nom de la classe</label>
                    <input type="text" name="nom" placeholder="Ex: CM1" required>
                </div>
                <div class="form-group">
                    <label>École</label>
                    <input type="text" name="ecole" placeholder="Ex: École Primaire Centre" required>
                </div>
                <div class="form-group">
                    <label>Année scolaire</label>
                    <input type="text" name="annee_scolaire" placeholder="Ex: 2025-2026" required>
                </div>
                <div class="form-group">
                    <label>Effectif prévu</label>
                    <input type="number" name="effectif" min="1" required>
                </div>
                <button type="submit" class="btn-primary">Créer la classe</button>
            </form>
        </div>
    </div>
</body>
</html>
