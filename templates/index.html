<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletins Scolaires</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* VARIABLES */
        :root {
            --primary: #503a82;
            --secondary: #007558;
            --white: #ffffff;
            --bg-gradient: linear-gradient(135deg, #332165 0%, #503a82 100%);
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 20px;
        }

        /* BODY */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            padding: 16px;
            color: var(--text-dark);
        }

        /* NAVBAR */
        .navbar {
            background: var(--white);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 20px 24px;
            /* margin-bottom: 20px; */
            box-shadow: 0 8px 24px rgba(0,0,0,.12);
            border: 1px solid rgba(255,255,255,0.3);
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
        }

        .nav-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            max-width: 620px;
            margin: 0 auto;
            margin-bottom: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 32px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,.1));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .navbar h1 {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            text-align: center;
        }

        /* CONTAINER */
        .container {
            max-width: 620px;
            margin: auto;
        }

        /* CARD */
        .form-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 32px 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,.15);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        /* SECTIONS */
        .section-title {
            margin: 32px 0 16px;
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* FORM */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-size: 15px;
            transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            font-family: inherit;
            color: var(--text-dark);
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:hover, select:hover {
            border-color: var(--secondary);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(80,58,130,.1);
            transform: translateY(-1px);
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236366f1' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            padding-right: 42px;
        }

        small {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        small::before {
            content: 'ℹ️';
            font-size: 14px;
        }

        /* FILE INPUT */
        .file-group {
            position: relative;
        }

        input[type="file"] {
            padding: 40px 18px;
            border: 2px dashed var(--border);
            background: #f8fafc;
            cursor: pointer;
            text-align: center;
            position: relative;
        }

        input[type="file"]:hover {
            border-color: var(--primary);
            background: #f1f5f9;
        }

        input[type="file"]::file-selector-button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: var(--white);
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
            transition: all .2s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--secondary);
            transform: translateY(-1px);
        }

        /* BUTTON */
        .btn-primary {
            margin-top: 28px;
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--primary), rgba(99,102,241));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(99,102,241,.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(99,102,241,.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        /* GRID LAYOUT FOR PAIRED INPUTS */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .form-card {
                padding: 24px 20px;
            }
        }

        @media (min-width: 768px) {
            .nav-content {
                flex-direction: row;
                justify-content: space-between;
            }

            body {
                padding: 24px;
            }

            .navbar {
                padding: 22px 32px;
            }
        }

        /* ANIMATIONS */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            animation: slideIn .5s ease-out;
        }
    </style>
</head>
<body>
    <!-- <nav class="navbar">
    
    </nav> -->

    <main class="container">
        <section class="form-card">
            <div class="nav-content">
                <div class="brand">
                    <span class="logo">📘</span>
                    <h1>Bulletins</h1>
                </div>
                <p class="tagline">Générez vos bulletins en 1 minute. Importez un fichier CSV et générez automatiquement les bulletins scolaires pour votre classe.</p>
            </div>

            <form method="POST" action="/csv/upload" enctype="multipart/form-data">
                <h3 class="section-title">Informations de la classe</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Classe</label>
                        <input type="text" name="nom" placeholder="CM1" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Trimestre</label>
                        <select name="trimestre" required>
                            <option value="">Sélectionner</option>
                            <option value="Premier">Premier</option>
                            <option value="Second">Second</option>
                            <option value="Troisième">Troisième</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>École</label>
                    <input type="text" name="ecole" placeholder="École Ndiana Ndour" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Année scolaire</label>
                        <input type="text" name="annee_scolaire" placeholder="2025 - 2026" required>
                    </div>

                    <div class="form-group">
                        <label>Enseignant(e)</label>
                        <input type="text" name="maitre" placeholder="M. Faye" required>
                    </div>
                </div>

                <h3 class="section-title">Fichier des élèves</h3>
                
                <div class="form-group file-group">
                    <input type="file" name="csv_file" accept=".csv" required>
                    <small>Format CSV avec colonnes : Prenom, Nom, Notes...</small>
                </div>

                <button class="btn-primary" type="submit">
                    <span>Générer les bulletins</span>
                    <span>🚀</span>
                </button>
            </form>
        </section>
    </main>
</body>
</html>
